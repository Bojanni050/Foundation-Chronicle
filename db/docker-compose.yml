services:
  chronicle-db:
    image: pgvector/pgvector:pg16
    container_name: chronicle-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chronicle
      POSTGRES_USER: chronicle
      POSTGRES_PASSWORD: chronicle
    ports:
      # 5433 is already taken by SongCompanion's own local Postgres on this machine.
      - "5434:5432"
    volumes:
      - chronicle_db_pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronicle -d chronicle"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chronicle_db_pgdata:
